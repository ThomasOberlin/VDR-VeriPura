<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to redefine window.fetch with getter/setter:', e);
          try {
            window.fetch = _fetch;
          } catch (e2) {
            console.error('Critical: window.fetch is read-only and non-configurable');
          }
        }
      })();
    </script>
    <title>VeriPura VDR v1.0.6</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      console.log("VeriPura Index v1.0.6 Loading...");
      
      // Aggressively unregister all service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            console.log("Unregistering service worker: " + registration.scope);
            registration.unregister().then(function(success) {
              if (success) {
                console.log("Service worker unregistered successfully.");
                // Force reload if we found and unregistered a worker
                window.location.reload(true);
              }
            });
          }
        });
      }
      
      // Clear all caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            console.log("Clearing cache: " + name);
            caches.delete(name);
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
